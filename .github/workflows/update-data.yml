name: Update War Data

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install coc.py python-dotenv

      - name: Run war collector
        env:
          COC_EMAIL: ${{ secrets.COC_EMAIL }}
          COC_PASSWORD: ${{ secrets.COC_PASSWORD }}
          CLAN_TAG: ${{ secrets.CLAN_TAG }}
        run: python war_collector.py

      - name: Export data to JSON
        run: python export_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ docs/index.html
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Auto-update war data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
